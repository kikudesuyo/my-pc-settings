name: Update README

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 各アプリのREADMEと、ルートREADMEのテーブルを更新
        run: |
          python3 << 'EOF'
          import subprocess
          import re
          from pathlib import Path

          ROOT_README = Path("README.md")
          content = ROOT_README.read_text(encoding="utf-8")

          # README.mdのリンク行からアプリ名とディレクトリを動的に取得
          pattern = re.compile(r'^\- \[(.+?)\]\((.+?)/README\.md\)', re.MULTILINE)
          rows = []
          for name, dir_ in pattern.findall(content):
              result = subprocess.run(
                  ["git", "log", "-1", "--format=%ad", "--date=format:%Y-%m-%d", "--", f"{dir_}/"],
                  capture_output=True, text=True
              )
              date = result.stdout.strip() or "未更新"
              rows.append((name, date))

              # 各アプリのREADME.mdに最終更新日を書き込む
              app_readme = Path(dir_) / "README.md"
              if app_readme.exists():
                  app_content = app_readme.read_text(encoding="utf-8")
                  block = f"<!-- LAST_UPDATED -->\n最終更新: {date}\n<!-- /LAST_UPDATED -->"
                  if "<!-- LAST_UPDATED -->" in app_content:
                      app_content = re.sub(
                          r'<!-- LAST_UPDATED -->.*?<!-- /LAST_UPDATED -->',
                          block, app_content, flags=re.DOTALL
                      )
                  else:
                      app_content += f"\n{block}\n"
                  app_readme.write_text(app_content, encoding="utf-8")

          # ルートREADME.mdのテーブルを更新
          table_rows = "\n".join(f"| {name} | {date} |" for name, date in rows)
          table = f"| アプリ | 最終更新 |\n|--------|----------|\n{table_rows}"
          new_block = f"<!-- APP_TABLE_START -->\n{table}\n<!-- APP_TABLE_END -->"
          content = re.sub(
              r'<!-- APP_TABLE_START -->.*?<!-- APP_TABLE_END -->',
              new_block, content, flags=re.DOTALL
          )
          ROOT_README.write_text(content, encoding="utf-8")
          EOF

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md */README.md
          git diff --cached --quiet || git commit -m "docs: READMEの最終更新日を自動更新"
          git push
